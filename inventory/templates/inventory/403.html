{% extends 'inventory/base.html' %}

{% block title %}Доступ запрещён{% endblock %}
{% block page_title %}Ошибка доступа{% endblock %}

{% block content %}

<div class="card" style="max-width: 760px; margin: 0 auto; text-align: center;">
    <h2 style="color: #c62828;">⛔ Доступ запрещён</h2>
    <p style="font-size: 18px; margin-top: 14px;">
        {{ message }}
    </p>
    <p style="margin-top: 10px;">
        У вашей роли нет прав для открытия данной страницы.
    </p>

    <div style="margin-top: 24px;">
        <a href="/" class="btn">🏠 Вернуться на главную</a>
    </div>
</div>

{% endblock %}
