{% extends 'inventory/base.html' %}

{% block title %}Оформление продажи{% endblock %}
{% block page_title %}Оформление продажи{% endblock %}

{% block content %}

<div class="card">
    <h2>Продажа (чек)</h2>
    <p>Добавьте товары и укажите количество.</p>
</div>

<div class="card">
    <form method="post" id="sale-order-form">
        {% csrf_token %}

        <div class="table-wrapper">
            <table id="sale-items-table">
                <thead>
                    <tr>
                        <th>Товар</th>
                        <th>Количество</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>
                            <select name="product" required>
                                <option value="">Выберите товар</option>
                                {% for product in products %}
                                <option value="{{ product.id }}">{{ product }}</option>
                                {% endfor %}
                            </select>
                        </td>
                        <td>
                            <input type="number" name="quantity" min="1" placeholder="Количество" required>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="actions-row" style="margin-top: 18px;">
            <button type="button" class="btn btn-secondary" onclick="addSaleRow()">Добавить товар</button>
            <button type="submit" class="btn">Оформить продажу</button>
        </div>
    </form>
</div>

<script>
    function addSaleRow() {
        const tableBody = document.querySelector('#sale-items-table tbody');
        const firstRow = tableBody.querySelector('tr');
        const newRow = firstRow.cloneNode(true);

        const select = newRow.querySelector('select');
        const input = newRow.querySelector('input');

        select.value = '';
        input.value = '';

        tableBody.appendChild(newRow);
    }
</script>

{% endblock %}
